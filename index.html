<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Project with Claude Code</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #e8d5f5;
      color: #1a1a1a;
      font-size: 18px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background-color: #f5eeff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(120, 60, 180, 0.15);
      max-width: 640px;
      width: 100%;
      padding: 48px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #4a0080;
      line-height: 1.3;
    }

    header p.subtitle {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #6b21a8;
      letter-spacing: 0.04em;
    }

    .divider {
      border: none;
      border-top: 2px solid #d8b4fe;
      margin: 32px 0;
    }

    .profile {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .profile-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .profile-item .label {
      min-width: 80px;
      font-weight: 600;
      color: #6b21a8;
      padding-top: 2px;
    }

    .profile-item .value {
      color: #1a1a1a;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.85rem;
      color: #9d4edd;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>My First Project with Claude Code</h1>
      <p class="subtitle">自己紹介ページ</p>
    </header>

    <hr class="divider">

    <section class="profile">
      <div class="profile-item">
        <span class="label">名前</span>
        <span class="value">今村秀蔵</span>
      </div>
      <div class="profile-item">
        <span class="label">趣味</span>
        <span class="value">プログラミング学習</span>
      </div>
      <div class="profile-item">
        <span class="label">目標</span>
        <span class="value">Claude Code をマスターする</span>
      </div>
    </section>

    <footer>
      <p>Powered by Claude Code</p>
    </footer>
  </div>
</body>
</html>
